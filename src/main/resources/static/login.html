<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Login - Citizen Paper Products</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f2f5;
            padding: 20px;
        }

        /* ===== MAIN CONTAINER ===== */
        .login-wrapper {
            width: 100%;
            max-width: 1100px;
            height: 650px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            background: #ffffff;
            position: relative;
        }

        /* ===== LEFT SIDE - IMAGE SECTION ===== */
        .image-section {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #1a1a2e;
            min-height: 400px;
        }

        .image-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('/images/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(4px) brightness(0.7);
            transform: scale(1.05);
            transition: transform 0.3s ease;
        }

        .image-section:hover::before {
            transform: scale(1.1);
        }

        /* Overlay gradient */
        .image-section::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, 
                rgba(26, 26, 46, 0.4) 0%,
                rgba(26, 26, 46, 0.1) 50%,
                rgba(26, 26, 46, 0.4) 100%
            );
            z-index: 1;
        }

        /* Logo on top-left */
        .logo-container {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-container img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        .logo-text {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        /* Company name at bottom */
        .company-name {
            position: absolute;
            bottom: 50px;
            left: 40px;
            z-index: 2;
            color: #ffffff;
        }

        .company-name h2 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
            margin-bottom: 4px;
        }

        .company-name p {
            font-size: 14px;
            opacity: 0.8;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        /* ===== RIGHT SIDE - FORM SECTION ===== */
        .form-section {
            flex: 1;
            padding: 50px 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #ffffff;
            min-width: 320px;
        }

        .form-header {
            margin-bottom: 35px;
        }

        .form-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .form-header p {
            color: #7a7a8a;
            font-size: 14px;
        }

        /* ===== TABS ===== */
        .tab-container {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #e8e8ec;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 600;
            color: #7a7a8a;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            text-align: center;
        }

        .tab-btn:hover {
            color: #1a1a2e;
        }

        .tab-btn.active {
            color: #1a1a2e;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: #1a1a2e;
            border-radius: 3px 3px 0 0;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: scaleX(0);
            }
            to {
                transform: scaleX(1);
            }
        }

        /* ===== FORM ===== */
        .form-content {
            display: block;
        }

        .form-content.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            border: 2px solid #e8e8ec;
            border-radius: 10px;
            font-size: 15px;
            color: #1a1a2e;
            background: #f8f8fa;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #1a1a2e;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(26, 26, 46, 0.08);
        }

        .form-group input::placeholder {
            color: #b0b0be;
        }

        .form-group input.error {
            border-color: #e74c3c;
            background: #fef6f6;
        }

        .error-text {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .error-text.visible {
            display: block;
        }

        /* Password field with toggle */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 48px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: #7a7a8a;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .toggle-password:hover {
            color: #1a1a2e;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            height: 52px;
            background: #1a1a2e;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            background: #2a2a4e;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(26, 26, 46, 0.25);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 968px) {
            .login-wrapper {
                height: auto;
                flex-direction: column;
                max-width: 500px;
            }

            .image-section {
                min-height: 250px;
                max-height: 280px;
            }

            .image-section::before {
                filter: blur(3px) brightness(0.6);
            }

            .logo-container {
                top: 20px;
                left: 24px;
            }

            .logo-container img {
                width: 38px;
                height: 38px;
            }

            .logo-text {
                font-size: 15px;
            }

            .company-name {
                bottom: 24px;
                left: 24px;
            }

            .company-name h2 {
                font-size: 22px;
            }

            .company-name p {
                font-size: 11px;
                letter-spacing: 3px;
            }

            .form-section {
                padding: 30px 24px;
                min-width: unset;
            }

            .form-header h1 {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .login-wrapper {
                border-radius: 16px;
            }

            .image-section {
                min-height: 200px;
                max-height: 220px;
            }

            .logo-container {
                top: 16px;
                left: 16px;
                gap: 8px;
            }

            .logo-container img {
                width: 32px;
                height: 32px;
            }

            .logo-text {
                font-size: 13px;
            }

            .company-name {
                bottom: 16px;
                left: 16px;
            }

            .company-name h2 {
                font-size: 18px;
            }

            .company-name p {
                font-size: 10px;
                letter-spacing: 2px;
            }

            .form-section {
                padding: 24px 18px;
            }

            .form-header {
                margin-bottom: 24px;
            }

            .form-header h1 {
                font-size: 20px;
            }

            .tab-btn {
                font-size: 14px;
                padding: 10px 12px;
            }

            .form-group input {
                height: 44px;
                font-size: 14px;
            }

            .submit-btn {
                height: 48px;
                font-size: 15px;
            }
        }

        /* ===== SUCCESS/ERROR MESSAGES ===== */
        .message-box {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .message-box.error {
            background: #fef6f6;
            color: #e74c3c;
            border: 1px solid #fde2e2;
            display: block;
        }

        .message-box.success {
            background: #f0faf4;
            color: #27ae60;
            border: 1px solid #d4efe3;
            display: block;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <!-- LEFT SIDE: Image Section -->
        <div class="image-section">
            <!-- Logo -->
            <div class="logo-container">
                <img src="/images/logo1.png" alt="Logo">
                <span class="logo-text">CITIZEN</span>
            </div>
            
            <!-- Company Name -->
            <div class="company-name">
                <h2>PAPER PRODUCTS</h2>
                <p>Since 1995</p>
            </div>
        </div>

        <!-- RIGHT SIDE: Form Section -->
        <div class="form-section">
            <div class="form-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your account to continue</p>
            </div>

            <!-- Message Box -->
            <div class="message-box" id="messageBox"></div>

            <!-- Tabs -->
            <div class="tab-container">
                <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- ===== LOGIN FORM ===== -->
            <div class="form-content" id="loginForm">
                <form id="loginFormElement" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginUsername">Username</label>
                        <input 
                            type="text" 
                            id="loginUsername" 
                            placeholder="Enter your username"
                            required
                            autocomplete="username"
                        >
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="loginPassword" 
                                placeholder="Enter your password"
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
                                👁
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">LOGIN</button>
                </form>
            </div>

            <!-- ===== REGISTER FORM ===== -->
            <div class="form-content hidden" id="registerForm">
                <form id="registerFormElement" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerMobile">Mobile Number</label>
                        <input 
                            type="tel" 
                            id="registerMobile" 
                            placeholder="Enter 10-digit mobile number"
                            required
                            pattern="[0-9]{10}"
                            maxlength="10"
                        >
                        <div class="error-text" id="mobileError">Please enter a valid 10-digit mobile number</div>
                    </div>

                    <div class="form-group">
                        <label for="registerUsername">Username</label>
                        <input 
                            type="text" 
                            id="registerUsername" 
                            placeholder="Choose a username"
                            required
                            minlength="3"
                            autocomplete="username"
                        >
                        <div class="error-text" id="usernameError">Username must be at least 3 characters</div>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="registerPassword" 
                                placeholder="Create a password (min 6 chars)"
                                required
                                minlength="6"
                                autocomplete="new-password"
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('registerPassword', this)">
                                👁
                            </button>
                        </div>
                        <div class="error-text" id="passwordError">Password must be at least 6 characters</div>
                    </div>

                    <div class="form-group">
                        <label for="registerConfirmPassword">Confirm Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="registerConfirmPassword" 
                                placeholder="Confirm your password"
                                required
                                autocomplete="new-password"
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('registerConfirmPassword', this)">
                                👁
                            </button>
                        </div>
                        <div class="error-text" id="confirmError">Passwords do not match</div>
                    </div>

                    <button type="submit" class="submit-btn">REGISTER</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ===== TAB SWITCHING =====
        function switchTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const header = document.querySelector('.form-header h1');
            const subheader = document.querySelector('.form-header p');
            const messageBox = document.getElementById('messageBox');

            // Hide message
            messageBox.style.display = 'none';
            messageBox.className = 'message-box';

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                header.textContent = 'Welcome Back';
                subheader.textContent = 'Sign in to your account to continue';
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                header.textContent = 'Create Account';
                subheader.textContent = 'Join Citizen Paper Products today';
            }
        }

        // ===== PASSWORD TOGGLE =====
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '🙈';
            } else {
                input.type = 'password';
                button.textContent = '👁';
            }
        }

        // ===== SHOW MESSAGE =====
        function showMessage(message, type) {
            const box = document.getElementById('messageBox');
            box.textContent = message;
            box.className = 'message-box ' + type;
            box.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                box.style.display = 'none';
            }, 5000);
        }

        // ===== HANDLE LOGIN =====
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            // Basic validation
            if (!username || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            const submitBtn = event.target.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            try {
                const response = await fetch('/perform_login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                        setTimeout(() => {
                            window.location.href = '/home.html';
                        }, 1000);
                } else {
                    showMessage(data.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'LOGIN';
                }
            } catch (error) {
                showMessage('Login failed. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'LOGIN';
            }
        }

        // ===== HANDLE REGISTER =====
        async function handleRegister(event) {
            event.preventDefault();
            
            const mobile = document.getElementById('registerMobile').value.trim();
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            // Clear previous errors
            document.querySelectorAll('.error-text').forEach(el => el.classList.remove('visible'));
            document.querySelectorAll('.form-group input').forEach(el => el.classList.remove('error'));

            let isValid = true;

            // Validate mobile
            if (!/^[0-9]{10}$/.test(mobile)) {
                document.getElementById('mobileError').classList.add('visible');
                document.getElementById('registerMobile').classList.add('error');
                isValid = false;
            }

            // Validate username
            if (username.length < 3) {
                document.getElementById('usernameError').classList.add('visible');
                document.getElementById('registerUsername').classList.add('error');
                isValid = false;
            }

            // Validate password
            if (password.length < 6) {
                document.getElementById('passwordError').classList.add('visible');
                document.getElementById('registerPassword').classList.add('error');
                isValid = false;
            }

            // Validate confirm password
            if (password !== confirmPassword) {
                document.getElementById('confirmError').classList.add('visible');
                document.getElementById('registerConfirmPassword').classList.add('error');
                isValid = false;
            }

            if (!isValid) {
                showMessage('Please fix the errors above', 'error');
                return;
            }

            const submitBtn = event.target.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        mobileNumber: mobile,
                        username, 
                        password,
                        confirmPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                        setTimeout(() => {
                            window.location.href = '/home.html';
                        }, 1000);
                } else {
                    showMessage(data.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'REGISTER';
                }
            } catch (error) {
                showMessage('Registration failed. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'REGISTER';
            }
        }

        // ===== REAL-TIME VALIDATION =====
        // Mobile number - only digits, max 10
        document.getElementById('registerMobile').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 10);
            if (this.value.length === 10) {
                this.classList.remove('error');
                document.getElementById('mobileError').classList.remove('visible');
            }
        });

        // Username validation
        document.getElementById('registerUsername').addEventListener('input', function() {
            if (this.value.length >= 3) {
                this.classList.remove('error');
                document.getElementById('usernameError').classList.remove('visible');
            }
        });

        // Password validation
        document.getElementById('registerPassword').addEventListener('input', function() {
            if (this.value.length >= 6) {
                this.classList.remove('error');
                document.getElementById('passwordError').classList.remove('visible');
            }
            // Also check confirm password match
            const confirm = document.getElementById('registerConfirmPassword');
            if (confirm.value && confirm.value !== this.value) {
                confirm.classList.add('error');
                document.getElementById('confirmError').classList.add('visible');
            } else if (confirm.value) {
                confirm.classList.remove('error');
                document.getElementById('confirmError').classList.remove('visible');
            }
        });

        // Confirm password validation
        document.getElementById('registerConfirmPassword').addEventListener('input', function() {
            const password = document.getElementById('registerPassword').value;
            if (this.value && this.value !== password) {
                this.classList.add('error');
                document.getElementById('confirmError').classList.add('visible');
            } else {
                this.classList.remove('error');
                document.getElementById('confirmError').classList.remove('visible');
            }
        });

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('messageBox').style.display = 'none';
            }
        });
    </script>

</body>
</html>
