<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0b0b1a" />
    <title>Login - Citizen Paper Products</title>
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0b1a;
            padding: 0;
        }

        /* ----- MAIN WRAPPER (full screen) ----- */
        .mvj-container {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: row;
            background: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* ----- LEFT PANEL – brand / image ----- */
        .brand-panel {
            flex: 1 1 52%;
            position: relative;
            background: #0b0b1a;
            overflow: hidden;
            min-height: 300px;
        }

        .brand-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('/images/background.png') center/cover no-repeat;
            filter: blur(5px) brightness(0.65) saturate(1.1);
            transform: scale(1.02);
            transition: transform 0.4s ease;
        }

        .brand-panel:hover::before {
            transform: scale(1.06);
        }

        /* dark overlay */
        .brand-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, rgba(8, 8, 28, 0.65) 0%, rgba(8, 8, 28, 0.20) 60%, rgba(8, 8, 28, 0.55) 100%);
            z-index: 1;
        }

        /* ----- LOGO (top-left) ----- */
        .logo-mvj {
            position: absolute;
            top: 36px;
            left: 36px;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-mvj img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            filter: brightness(0) invert(1) drop-shadow(0 2px 8px rgba(0, 0, 0, 0.5));
        }

        .logo-mvj span {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 12px 4px 8px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        /* ----- brand text (left bottom) ----- */
        .brand-caption {
            position: absolute;
            bottom: 44px;
            left: 36px;
            z-index: 5;
            color: #fff;
        }

        .brand-caption h2 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            margin-bottom: 2px;
        }

        .brand-caption p {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.7;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        /* ----- RIGHT PANEL – form ----- */
        .form-panel {
            flex: 1 1 48%;
            padding: 48px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #ffffff;
            min-width: 300px;
        }

        .form-panel .greeting {
            margin-bottom: 28px;
        }

        .form-panel .greeting h1 {
            font-size: 30px;
            font-weight: 700;
            color: #0b0b1a;
            letter-spacing: -0.3px;
        }

        .form-panel .greeting p {
            color: #6b6b7e;
            font-size: 15px;
            margin-top: 4px;
        }

        /* message box */
        .message-box {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }

        .message-box.error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            display: block;
        }

        .message-box.success {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
            display: block;
        }

        /* tabs */
        .tab-bar {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #eaeaf0;
            margin-bottom: 28px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 8px 14px;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            color: #7a7a8e;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            position: relative;
        }

        .tab-btn:hover {
            color: #0b0b1a;
        }

        .tab-btn.active {
            color: #0b0b1a;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 20%;
            right: 20%;
            height: 3px;
            background: #0b0b1a;
            border-radius: 8px 8px 0 0;
            transition: 0.2s;
        }

        .form-content {
            display: block;
        }

        .form-content.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1e1e2e;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            height: 50px;
            padding: 0 16px;
            border: 2px solid #eaeaf0;
            border-radius: 12px;
            font-size: 15px;
            background: #fafafc;
            transition: 0.2s;
            outline: none;
            color: #0b0b1a;
        }

        .form-group input:focus {
            border-color: #0b0b1a;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(11, 11, 26, 0.06);
        }

        .form-group input::placeholder {
            color: #acacbc;
        }

        .form-group input.error {
            border-color: #b91c1c;
            background: #fef6f6;
        }

        .error-text {
            color: #b91c1c;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .error-text.visible {
            display: block;
        }

        /* password toggle */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 48px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 20px;
            color: #7a7a8e;
            cursor: pointer;
            padding: 4px;
            transition: 0.2s;
        }

        .toggle-password:hover {
            color: #0b0b1a;
        }

        .submit-btn {
            width: 100%;
            height: 54px;
            background: #0b0b1a;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 8px;
        }

        .submit-btn:hover {
            background: #1e1e3a;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(11, 11, 26, 0.25);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* ----- RESPONSIVE (mobile & tablet) ----- */
        @media (max-width: 820px) {
            .mvj-container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                min-height: 100dvh;
            }

            .brand-panel {
                flex: 0 0 240px;
                min-height: 200px;
                width: 100%;
            }

            .brand-panel::before {
                filter: blur(3px) brightness(0.6);
            }

            .logo-mvj {
                top: 20px;
                left: 22px;
            }

            .logo-mvj img {
                width: 38px;
                height: 38px;
            }

            .logo-mvj span {
                font-size: 16px;
                padding: 2px 10px 2px 8px;
            }

            .brand-caption {
                bottom: 24px;
                left: 22px;
            }

            .brand-caption h2 {
                font-size: 24px;
            }

            .brand-caption p {
                font-size: 10px;
                letter-spacing: 3px;
            }

            .form-panel {
                padding: 32px 24px;
                flex: 1 1 auto;
                min-width: unset;
            }

            .form-panel .greeting h1 {
                font-size: 26px;
            }
        }

        @media (max-width: 480px) {
            .brand-panel {
                flex: 0 0 180px;
                min-height: 160px;
            }

            .logo-mvj {
                top: 14px;
                left: 16px;
                gap: 8px;
            }

            .logo-mvj img {
                width: 30px;
                height: 30px;
            }

            .logo-mvj span {
                font-size: 13px;
                padding: 0 8px 0 6px;
            }

            .brand-caption {
                bottom: 16px;
                left: 16px;
            }

            .brand-caption h2 {
                font-size: 20px;
            }

            .brand-caption p {
                font-size: 9px;
                letter-spacing: 2px;
            }

            .form-panel {
                padding: 24px 16px;
            }

            .form-panel .greeting h1 {
                font-size: 22px;
            }

            .form-panel .greeting p {
                font-size: 13px;
            }

            .tab-btn {
                font-size: 14px;
                padding: 10px 4px 12px;
            }

            .form-group input {
                height: 44px;
                font-size: 14px;
            }

            .submit-btn {
                height: 48px;
                font-size: 15px;
            }
        }

        @media (max-width: 380px) {
            .brand-panel {
                flex: 0 0 150px;
                min-height: 130px;
            }

            .form-panel {
                padding: 18px 12px;
            }
        }
    </style>
</head>
<body>

<div class="mvj-container">

    <!-- LEFT: brand panel -->
    <div class="brand-panel">
        <div class="logo-mvj">
            <img src="/images/logo1.png" alt="MVJ" />
            <span>CITIZEN</span>
        </div>
        <div class="brand-caption">
            <h2>PAPER PRODUCTS</h2>
        </div>
    </div>

    <!-- RIGHT: form panel -->
    <div class="form-panel">
        <div class="greeting">
            <h1 id="formTitle">Welcome Back</h1>
            <p id="formSub">Sign in to your account to continue</p>
        </div>

        <div class="message-box" id="messageBox"></div>

        <!-- tabs -->
        <div class="tab-bar">
            <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- LOGIN FORM -->
        <div class="form-content" id="loginForm">
            <form id="loginFormElement" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" required autocomplete="username" />
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password" />
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">👁</button>
                    </div>
                </div>
                <button type="submit" class="submit-btn">LOGIN</button>
            </form>
        </div>

        <!-- REGISTER FORM -->
        <div class="form-content hidden" id="registerForm">
            <form id="registerFormElement" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="registerMobile">Mobile Number</label>
                    <input type="tel" id="registerMobile" placeholder="Enter 10-digit mobile" required pattern="[0-9]{10}" maxlength="10" />
                    <div class="error-text" id="mobileError">Enter a valid 10-digit number</div>
                </div>
                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" placeholder="Choose a username" required minlength="3" autocomplete="username" />
                    <div class="error-text" id="usernameError">Minimum 3 characters</div>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="registerPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password" />
                        <button type="button" class="toggle-password" onclick="togglePassword('registerPassword', this)">👁</button>
                    </div>
                    <div class="error-text" id="passwordError">Password must be at least 6 characters</div>
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="registerConfirmPassword" placeholder="Confirm your password" required autocomplete="new-password" />
                        <button type="button" class="toggle-password" onclick="togglePassword('registerConfirmPassword', this)">👁</button>
                    </div>
                    <div class="error-text" id="confirmError">Passwords do not match</div>
                </div>
                <button type="submit" class="submit-btn">REGISTER</button>
            </form>
        </div>
    </div>
</div>

<script>
    // ----- TAB SWITCH -----
    function switchTab(tab) {
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const title = document.getElementById('formTitle');
        const sub = document.getElementById('formSub');
        const msg = document.getElementById('messageBox');

        msg.style.display = 'none';
        msg.className = 'message-box';

        if (tab === 'login') {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            title.textContent = 'Welcome Back';
            sub.textContent = 'Sign in to your account to continue';
        } else {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            title.textContent = 'Create Account';
            sub.textContent = 'Join Citizen Paper Products today';
        }
    }

    // ----- PASSWORD TOGGLE -----
    function togglePassword(inputId, btn) {
        const inp = document.getElementById(inputId);
        if (inp.type === 'password') {
            inp.type = 'text';
            btn.textContent = '🙈';
        } else {
            inp.type = 'password';
            btn.textContent = '👁';
        }
    }

    // ----- MESSAGE HELPER -----
    function showMessage(text, type) {
        const box = document.getElementById('messageBox');
        box.textContent = text;
        box.className = 'message-box ' + type;
        box.style.display = 'block';
        setTimeout(() => { box.style.display = 'none'; }, 5000);
    }

    // ----- LOGIN HANDLER -----
    async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!username || !password) {
            showMessage('Please fill in all fields', 'error');
            return;
        }

        const btn = e.target.querySelector('.submit-btn');
        btn.disabled = true;
        btn.textContent = 'Logging in...';

        try {
            const res = await fetch('/perform_login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                showMessage(data.message, 'success');
                setTimeout(() => { window.location.href = '/home.html'; }, 1000);
            } else {
                showMessage(data.message, 'error');
                btn.disabled = false;
                btn.textContent = 'LOGIN';
            }
        } catch (_) {
            showMessage('Login failed. Please try again.', 'error');
            btn.disabled = false;
            btn.textContent = 'LOGIN';
        }
    }

    // ----- REGISTER HANDLER -----
    async function handleRegister(e) {
        e.preventDefault();

        const mobile = document.getElementById('registerMobile').value.trim();
        const username = document.getElementById('registerUsername').value.trim();
        const password = document.getElementById('registerPassword').value;
        const confirm = document.getElementById('registerConfirmPassword').value;

        // reset errors
        document.querySelectorAll('.error-text').forEach(el => el.classList.remove('visible'));
        document.querySelectorAll('.form-group input').forEach(el => el.classList.remove('error'));

        let valid = true;

        if (!/^[0-9]{10}$/.test(mobile)) {
            document.getElementById('mobileError').classList.add('visible');
            document.getElementById('registerMobile').classList.add('error');
            valid = false;
        }
        if (username.length < 3) {
            document.getElementById('usernameError').classList.add('visible');
            document.getElementById('registerUsername').classList.add('error');
            valid = false;
        }
        if (password.length < 6) {
            document.getElementById('passwordError').classList.add('visible');
            document.getElementById('registerPassword').classList.add('error');
            valid = false;
        }
        if (password !== confirm) {
            document.getElementById('confirmError').classList.add('visible');
            document.getElementById('registerConfirmPassword').classList.add('error');
            valid = false;
        }

        if (!valid) {
            showMessage('Please fix the errors above', 'error');
            return;
        }

        const btn = e.target.querySelector('.submit-btn');
        btn.disabled = true;
        btn.textContent = 'Registering...';

        try {
            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mobileNumber: mobile, username, password, confirmPassword: confirm })
            });
            const data = await res.json();

            if (data.success) {
                showMessage(data.message, 'success');
                setTimeout(() => { window.location.href = '/home.html'; }, 1000);
            } else {
                showMessage(data.message, 'error');
                btn.disabled = false;
                btn.textContent = 'REGISTER';
            }
        } catch (_) {
            showMessage('Registration failed. Please try again.', 'error');
            btn.disabled = false;
            btn.textContent = 'REGISTER';
        }
    }

    // ----- REAL-TIME VALIDATION HELPERS -----
    document.getElementById('registerMobile').addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '').slice(0, 10);
        if (this.value.length === 10) {
            this.classList.remove('error');
            document.getElementById('mobileError').classList.remove('visible');
        }
    });

    document.getElementById('registerUsername').addEventListener('input', function() {
        if (this.value.length >= 3) {
            this.classList.remove('error');
            document.getElementById('usernameError').classList.remove('visible');
        }
    });

    document.getElementById('registerPassword').addEventListener('input', function() {
        if (this.value.length >= 6) {
            this.classList.remove('error');
            document.getElementById('passwordError').classList.remove('visible');
        }
        const c = document.getElementById('registerConfirmPassword');
        if (c.value && c.value !== this.value) {
            c.classList.add('error');
            document.getElementById('confirmError').classList.add('visible');
        } else if (c.value) {
            c.classList.remove('error');
            document.getElementById('confirmError').classList.remove('visible');
        }
    });

    document.getElementById('registerConfirmPassword').addEventListener('input', function() {
        const pwd = document.getElementById('registerPassword').value;
        if (this.value && this.value !== pwd) {
            this.classList.add('error');
            document.getElementById('confirmError').classList.add('visible');
        } else {
            this.classList.remove('error');
            document.getElementById('confirmError').classList.remove('visible');
        }
    });

    // Escape key to dismiss message
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.getElementById('messageBox').style.display = 'none';
        }
    });
</script>

</body>
</html>
