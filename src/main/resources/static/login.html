<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0b0b1a" />
    <title>Login - Citizen Paper Products</title>
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ----- FULL SCREEN PAGE ----- */
        .page {
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            overflow: hidden;
            padding: 40px 6vw;
        }

        /* full-bleed blurred background */
        .page::before {
            content: '';
            position: absolute;
            inset: -20px;
            background: url('/images/background.png') center/cover no-repeat;
            filter: blur(6px) brightness(0.85) saturate(1.05);
            z-index: 0;
        }

        /* soft overlay for contrast */
        .page::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.25) 45%, rgba(255,255,255,0.45) 100%);
            z-index: 1;
        }

        /* ----- BIG CENTERED LOGO (left side) ----- */
        .logo-side {
            position: relative;
            z-index: 2;
            flex: 1 1 45%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-side img {
            width: min(340px, 34vw);
            max-width: 100%;
            object-fit: contain;
            filter: drop-shadow(0 12px 30px rgba(0, 0, 0, 0.25));
        }

        /* ----- GLASS CARD (right side) ----- */
        .card-side {
            position: relative;
            z-index: 2;
            flex: 0 1 420px;
            width: 100%;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(22px) saturate(1.4);
            -webkit-backdrop-filter: blur(22px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 26px;
            padding: 36px 32px;
            box-shadow: 0 20px 60px rgba(11, 11, 26, 0.18);
        }

        .greeting {
            margin-bottom: 22px;
            text-align: center;
        }

        .greeting h1 {
            font-size: 24px;
            font-weight: 700;
            color: #0b0b1a;
            letter-spacing: -0.3px;
        }

        .greeting p {
            color: #4b4b5e;
            font-size: 13.5px;
            margin-top: 4px;
        }

        /* message box */
        .message-box {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }

        .message-box.error {
            background: rgba(254, 242, 242, 0.9);
            color: #b91c1c;
            border: 1px solid #fecaca;
            display: block;
        }

        .message-box.success {
            background: rgba(236, 253, 245, 0.9);
            color: #065f46;
            border: 1px solid #a7f3d0;
            display: block;
        }

        /* tabs — pill segmented control, matches glass aesthetic */
        .tab-bar {
            display: flex;
            gap: 4px;
            background: rgba(11, 11, 26, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 8px;
            border: none;
            background: transparent;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            color: #5a5a6e;
            cursor: pointer;
            transition: 0.25s;
            text-align: center;
        }

        .tab-btn:hover {
            color: #0b0b1a;
        }

        .tab-btn.active {
            color: #fff;
            background: #0b0b1a;
            box-shadow: 0 4px 14px rgba(11, 11, 26, 0.35);
        }

        .form-content {
            display: block;
        }

        .form-content.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: #1e1e2e;
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            height: 52px;
            padding: 0 48px 0 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            border-radius: 50px;
            font-size: 14.5px;
            background: rgba(255, 255, 255, 0.85);
            transition: 0.2s;
            outline: none;
            color: #0b0b1a;
        }

        .form-group input:focus {
            border-color: #0b0b1a;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(11, 11, 26, 0.08);
        }

        .form-group input::placeholder {
            color: #9a9aac;
        }

        .form-group input.error {
            border-color: #b91c1c;
            background: rgba(254, 246, 246, 0.9);
        }

        .error-text {
            color: #b91c1c;
            font-size: 11.5px;
            margin-top: 5px;
            padding-left: 6px;
            display: none;
        }

        .error-text.visible {
            display: block;
        }

        /* icon inside pill input (person / eye) */
        .field-icon {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #0b0b1a;
            color: #fff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
        }

        .field-icon.static {
            cursor: default;
        }

        .terms-note {
            text-align: center;
            font-size: 11.5px;
            color: #6b6b7e;
            margin-top: 2px;
            margin-bottom: 18px;
        }

        .terms-note a {
            color: #0b0b1a;
            font-weight: 600;
            text-decoration: none;
        }

        .terms-note a:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            height: 54px;
            background: #0b0b1a;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.6px;
            cursor: pointer;
            transition: 0.25s;
        }

        .submit-btn:hover {
            background: #1e1e3a;
            transform: translateY(-2px);
            box-shadow: 0 10px 26px rgba(11, 11, 26, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 900px) {
            .page {
                flex-direction: column;
                justify-content: center;
                padding: 32px 20px;
                gap: 28px;
            }

            .logo-side {
                flex: 0 0 auto;
            }

            .logo-side img {
                width: min(200px, 45vw);
            }

            .card-side {
                flex: 0 1 auto;
                max-width: 420px;
            }
        }

        @media (max-width: 420px) {
            .glass-card {
                padding: 26px 20px;
                border-radius: 22px;
            }

            .logo-side img {
                width: 150px;
            }

            .form-group input,
            .submit-btn {
                height: 48px;
            }
        }
    </style>
</head>
<body>

<div class="page">

    <!-- LEFT: big centered logo, no text -->
    <div class="logo-side">
        <img src="/images/logo1.png" alt="Citizen Paper Products" />
    </div>

    <!-- RIGHT: glass card -->
    <div class="card-side">
        <div class="glass-card">
            <div class="greeting">
                <h1 id="formTitle">Welcome Back</h1>
                <p id="formSub">Sign in to your account to continue</p>
            </div>

            <div class="message-box" id="messageBox"></div>

            <!-- tabs -->
            <div class="tab-bar">
                <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- LOGIN FORM -->
            <div class="form-content" id="loginForm">
                <form id="loginFormElement" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginUsername">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="loginUsername" placeholder="Enter your username" required autocomplete="username" />
                            <span class="field-icon static">👤</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password" />
                            <button type="button" class="field-icon" onclick="togglePassword('loginPassword', this)">👁</button>
                        </div>
                    </div>
                    <p class="terms-note">By signing in you accept our <a href="#">Terms and Conditions</a></p>
                    <button type="submit" class="submit-btn">LOGIN</button>
                </form>
            </div>

            <!-- REGISTER FORM -->
            <div class="form-content hidden" id="registerForm">
                <form id="registerFormElement" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerMobile">Mobile Number</label>
                        <div class="input-wrapper">
                            <input type="tel" id="registerMobile" placeholder="Enter 10-digit mobile" required pattern="[0-9]{10}" maxlength="10" />
                            <span class="field-icon static">📱</span>
                        </div>
                        <div class="error-text" id="mobileError">Enter a valid 10-digit number</div>
                    </div>
                    <div class="form-group">
                        <label for="registerUsername">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="registerUsername" placeholder="Choose a username" required minlength="3" autocomplete="username" />
                            <span class="field-icon static">👤</span>
                        </div>
                        <div class="error-text" id="usernameError">Minimum 3 characters</div>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="registerPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password" />
                            <button type="button" class="field-icon" onclick="togglePassword('registerPassword', this)">👁</button>
                        </div>
                        <div class="error-text" id="passwordError">Password must be at least 6 characters</div>
                    </div>
                    <div class="form-group">
                        <label for="registerConfirmPassword">Confirm Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="registerConfirmPassword" placeholder="Confirm your password" required autocomplete="new-password" />
                            <button type="button" class="field-icon" onclick="togglePassword('registerConfirmPassword', this)">👁</button>
                        </div>
                        <div class="error-text" id="confirmError">Passwords do not match</div>
                    </div>
                    <p class="terms-note">By registering you accept our <a href="#">Terms and Conditions</a></p>
                    <button type="submit" class="submit-btn">REGISTER</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // ----- TAB SWITCH -----
    function switchTab(tab) {
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const title = document.getElementById('formTitle');
        const sub = document.getElementById('formSub');
        const msg = document.getElementById('messageBox');

        msg.style.display = 'none';
        msg.className = 'message-box';

        if (tab === 'login') {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            title.textContent = 'Welcome Back';
            sub.textContent = 'Sign in to your account to continue';
        } else {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            title.textContent = 'Create Account';
            sub.textContent = 'Join Citizen Paper Products today';
        }
    }

    // ----- PASSWORD TOGGLE -----
    function togglePassword(inputId, btn) {
        const inp = document.getElementById(inputId);
        if (inp.type === 'password') {
            inp.type = 'text';
            btn.textContent = '🙈';
        } else {
            inp.type = 'password';
            btn.textContent = '👁';
        }
    }

    // ----- MESSAGE HELPER -----
    function showMessage(text, type) {
        const box = document.getElementById('messageBox');
        box.textContent = text;
        box.className = 'message-box ' + type;
        box.style.display = 'block';
        setTimeout(() => { box.style.display = 'none'; }, 5000);
    }

    // ----- LOGIN HANDLER -----
    async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!username || !password) {
            showMessage('Please fill in all fields', 'error');
            return;
        }

        const btn = e.target.querySelector('.submit-btn');
        btn.disabled = true;
        btn.textContent = 'Logging in...';

        try {
            const res = await fetch('/perform_login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                showMessage(data.message, 'success');
                setTimeout(() => { window.location.href = '/home.html'; }, 1000);
            } else {
                showMessage(data.message, 'error');
                btn.disabled = false;
                btn.textContent = 'LOGIN';
            }
        } catch (_) {
            showMessage('Login failed. Please try again.', 'error');
            btn.disabled = false;
            btn.textContent = 'LOGIN';
        }
    }

    // ----- REGISTER HANDLER -----
    async function handleRegister(e) {
        e.preventDefault();

        const mobile = document.getElementById('registerMobile').value.trim();
        const username = document.getElementById('registerUsername').value.trim();
        const password = document.getElementById('registerPassword').value;
        const confirm = document.getElementById('registerConfirmPassword').value;

        // reset errors
        document.querySelectorAll('.error-text').forEach(el => el.classList.remove('visible'));
        document.querySelectorAll('.form-group input').forEach(el => el.classList.remove('error'));

        let valid = true;

        if (!/^[0-9]{10}$/.test(mobile)) {
            document.getElementById('mobileError').classList.add('visible');
            document.getElementById('registerMobile').classList.add('error');
            valid = false;
        }
        if (username.length < 3) {
            document.getElementById('usernameError').classList.add('visible');
            document.getElementById('registerUsername').classList.add('error');
            valid = false;
        }
        if (password.length < 6) {
            document.getElementById('passwordError').classList.add('visible');
            document.getElementById('registerPassword').classList.add('error');
            valid = false;
        }
        if (password !== confirm) {
            document.getElementById('confirmError').classList.add('visible');
            document.getElementById('registerConfirmPassword').classList.add('error');
            valid = false;
        }

        if (!valid) {
            showMessage('Please fix the errors above', 'error');
            return;
        }

        const btn = e.target.querySelector('.submit-btn');
        btn.disabled = true;
        btn.textContent = 'Registering...';

        try {
            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mobileNumber: mobile, username, password, confirmPassword: confirm })
            });
            const data = await res.json();

            if (data.success) {
                showMessage(data.message, 'success');
                setTimeout(() => { window.location.href = '/home.html'; }, 1000);
            } else {
                showMessage(data.message, 'error');
                btn.disabled = false;
                btn.textContent = 'REGISTER';
            }
        } catch (_) {
            showMessage('Registration failed. Please try again.', 'error');
            btn.disabled = false;
            btn.textContent = 'REGISTER';
        }
    }

    // ----- REAL-TIME VALIDATION HELPERS -----
    document.getElementById('registerMobile').addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '').slice(0, 10);
        if (this.value.length === 10) {
            this.classList.remove('error');
            document.getElementById('mobileError').classList.remove('visible');
        }
    });

    document.getElementById('registerUsername').addEventListener('input', function() {
        if (this.value.length >= 3) {
            this.classList.remove('error');
            document.getElementById('usernameError').classList.remove('visible');
        }
    });

    document.getElementById('registerPassword').addEventListener('input', function() {
        if (this.value.length >= 6) {
            this.classList.remove('error');
            document.getElementById('passwordError').classList.remove('visible');
        }
        const c = document.getElementById('registerConfirmPassword');
        if (c.value && c.value !== this.value) {
            c.classList.add('error');
            document.getElementById('confirmError').classList.add('visible');
        } else if (c.value) {
            c.classList.remove('error');
            document.getElementById('confirmError').classList.remove('visible');
        }
    });

    document.getElementById('registerConfirmPassword').addEventListener('input', function() {
        const pwd = document.getElementById('registerPassword').value;
        if (this.value && this.value !== pwd) {
            this.classList.add('error');
            document.getElementById('confirmError').classList.add('visible');
        } else {
            this.classList.remove('error');
            document.getElementById('confirmError').classList.remove('visible');
        }
    });

    // Escape key to dismiss message
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.getElementById('messageBox').style.display = 'none';
        }
    });
</script>

</body>
</html>
