<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f1f4d" />
    <title>Login - Citizen Paper Products</title>
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ----- FULL SCREEN PAGE ----- */
        .page {
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            overflow: hidden;
            padding: 40px 6vw;
        }

        /* full-bleed blurred background */
        .page::before {
            content: '';
            position: absolute;
            inset: -20px;
            background: url('/images/background.png') center/cover no-repeat;
            filter: blur(6px) brightness(0.85) saturate(1.05);
            z-index: 0;
        }

        /* soft overlay for contrast */
        .page::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.25) 45%, rgba(255,255,255,0.45) 100%);
            z-index: 1;
        }

        /* ----- BIG CENTERED LOGO (left side) ----- */
        .logo-side {
            position: relative;
            z-index: 2;
            flex: 1 1 45%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* wrapper sized exactly to the logo image so glow + shimmer align perfectly */
        .logo-wrap {
            position: relative;
            display: inline-block;
            animation: logoFloat 7s ease-in-out infinite;
        }

        /* soft dark spotlight behind the logo — separates it from the busy background */
        .logo-wrap::before {
            content: '';
            position: absolute;
            top: -35%;
            left: -35%;
            right: -35%;
            bottom: -35%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(11, 11, 26, 0.42) 0%, rgba(11, 11, 26, 0.18) 45%, rgba(11, 11, 26, 0) 72%);
            filter: blur(26px);
            z-index: -1;
            animation: glowPulse 6s ease-in-out infinite;
        }

        .logo-wrap img {
            display: block;
            width: min(340px, 34vw);
            max-width: 100%;
            object-fit: contain;
            filter: drop-shadow(0 14px 34px rgba(0, 0, 0, 0.45)) drop-shadow(0 0 24px rgba(214, 178, 110, 0.4));
            animation: logoGleam 6s ease-in-out infinite;
        }

        /* metallic shimmer, masked to the exact shape of the logo */
        .logo-shimmer {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            -webkit-mask-image: url('/images/logo1.png');
            mask-image: url('/images/logo1.png');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            background: linear-gradient(115deg, transparent 30%, rgba(255, 255, 255, 0.95) 48%, rgba(255, 221, 150, 0.95) 52%, transparent 70%);
            background-size: 260% 260%;
            background-position: -160% -160%;
            mix-blend-mode: overlay;
            animation: shimmerSweep 5s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(0.6deg); }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.65; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.07); }
        }

        @keyframes logoGleam {
            0%, 100% { filter: drop-shadow(0 14px 34px rgba(0, 0, 0, 0.45)) drop-shadow(0 0 24px rgba(214, 178, 110, 0.4)) brightness(1) saturate(1); }
            50% { filter: drop-shadow(0 14px 34px rgba(0, 0, 0, 0.45)) drop-shadow(0 0 32px rgba(255, 210, 130, 0.65)) brightness(1.08) saturate(1.15); }
        }

        @keyframes shimmerSweep {
            0% { background-position: -160% -160%; opacity: 0; }
            12% { opacity: 1; }
            45% { background-position: 160% 160%; opacity: 1; }
            58% { opacity: 0; }
            100% { background-position: 160% 160%; opacity: 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            .logo-wrap,
            .logo-wrap img,
            .logo-shimmer,
            .logo-wrap::before {
                animation: none !important;
            }
        }

        /* ----- GLASS CARD (right side) ----- */
        .card-side {
            position: relative;
            z-index: 2;
            flex: 0 1 420px;
            width: 100%;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(22px) saturate(1.4);
            -webkit-backdrop-filter: blur(22px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 26px;
            padding: 36px 32px;
            box-shadow: 0 20px 60px rgba(11, 11, 26, 0.18);
        }

        .greeting {
            margin-bottom: 22px;
            text-align: center;
        }

        .greeting h1 {
            font-size: 24px;
            font-weight: 700;
            color: #0f1f4d;
            letter-spacing: -0.3px;
        }

        .greeting p {
            color: #4b4b5e;
            font-size: 13.5px;
            margin-top: 4px;
        }

        /* message box */
        .message-box {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }

        .message-box.error {
            background: rgba(254, 242, 242, 0.9);
            color: #b91c1c;
            border: 1px solid #fecaca;
            display: block;
        }

        .message-box.success {
            background: rgba(236, 253, 245, 0.9);
            color: #065f46;
            border: 1px solid #a7f3d0;
            display: block;
        }

        /* ----- SINGLE LOGIN FORM (no tabs) ----- */
        .form-content {
            display: block;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: #1e1e2e;
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            height: 52px;
            padding: 0 48px 0 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            border-radius: 50px;
            font-size: 14.5px;
            background: rgba(255, 255, 255, 0.85);
            transition: 0.2s;
            outline: none;
            color: #0f1f4d;
        }

        .form-group input:focus {
            border-color: #0f1f4d;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(11, 11, 26, 0.08);
        }

        .form-group input::placeholder {
            color: #9a9aac;
        }

        .form-group input.error {
            border-color: #b91c1c;
            background: rgba(254, 246, 246, 0.9);
        }

        .error-text {
            color: #b91c1c;
            font-size: 11.5px;
            margin-top: 5px;
            padding-left: 6px;
            display: none;
        }

        .error-text.visible {
            display: block;
        }

        /* icon inside pill input (person / eye) */
        .field-icon {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #0f1f4d;
            color: #fff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
        }

        .field-icon.static {
            cursor: default;
        }

        .terms-note {
            text-align: center;
            font-size: 11.5px;
            color: #6b6b7e;
            margin-top: 2px;
            margin-bottom: 18px;
        }

        .terms-note a {
            color: #0f1f4d;
            font-weight: 600;
            text-decoration: none;
        }

        .terms-note a:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            height: 54px;
            background: #0f1f4d;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.6px;
            cursor: pointer;
            transition: 0.25s;
        }

        .submit-btn:hover {
            background: #1e1e3a;
            transform: translateY(-2px);
            box-shadow: 0 10px 26px rgba(11, 11, 26, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 900px) {
            .page {
                flex-direction: column;
                justify-content: center;
                padding: 32px 20px;
                gap: 28px;
            }

            .logo-side {
                flex: 0 0 auto;
            }

            .logo-side img {
                width: min(200px, 45vw);
            }

            .card-side {
                flex: 0 1 auto;
                max-width: 420px;
            }
        }

        @media (max-width: 420px) {
            .glass-card {
                padding: 26px 20px;
                border-radius: 22px;
            }

            .logo-side img {
                width: 150px;
            }

            .form-group input,
            .submit-btn {
                height: 48px;
            }
        }
    </style>
</head>
<body>

<div class="page">

    <!-- LEFT: big centered logo, no text -->
    <div class="logo-side">
        <div class="logo-wrap">
            <img src="/images/logo1.png" alt="Citizen Paper Products" />
            <div class="logo-shimmer"></div>
        </div>
    </div>

    <!-- RIGHT: glass card -->
    <div class="card-side">
        <div class="glass-card">
            <div class="greeting">
                <h1>Welcome Back</h1>
                <p>Sign in to your account to continue</p>
            </div>

            <div class="message-box" id="messageBox"></div>

            <!-- LOGIN FORM ONLY - NO REGISTER TAB -->
            <div class="form-content" id="loginForm">
                <form id="loginFormElement" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginUsername">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="loginUsername" placeholder="Enter your username" required autocomplete="username" />
                            <span class="field-icon static">👤</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password" />
                            <button type="button" class="field-icon" onclick="togglePassword('loginPassword', this)">👁</button>
                        </div>
                    </div>
                    <p class="terms-note">By signing in you accept our <a href="#">Terms and Conditions</a></p>
                    <button type="submit" class="submit-btn">LOGIN</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // ----- PASSWORD TOGGLE -----
    function togglePassword(inputId, btn) {
        const inp = document.getElementById(inputId);
        if (inp.type === 'password') {
            inp.type = 'text';
            btn.textContent = '🙈';
        } else {
            inp.type = 'password';
            btn.textContent = '👁';
        }
    }

    // ----- MESSAGE HELPER -----
    function showMessage(text, type) {
        const box = document.getElementById('messageBox');
        box.textContent = text;
        box.className = 'message-box ' + type;
        box.style.display = 'block';
        setTimeout(() => { box.style.display = 'none'; }, 5000);
    }

    // ----- LOGIN HANDLER -----
    async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!username || !password) {
            showMessage('Please fill in all fields', 'error');
            return;
        }

        const btn = e.target.querySelector('.submit-btn');
        btn.disabled = true;
        btn.textContent = 'Logging in...';

        try {
            const res = await fetch('/perform_login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                // Save username for display on home page
                localStorage.setItem('username', username);
                showMessage(data.message, 'success');
                setTimeout(() => { window.location.href = '/home.html'; }, 1000);
            } else {
                showMessage(data.message, 'error');
                btn.disabled = false;
                btn.textContent = 'LOGIN';
            }
        } catch (_) {
            showMessage('Login failed. Please try again.', 'error');
            btn.disabled = false;
            btn.textContent = 'LOGIN';
        }
    }

    // Escape key to dismiss message
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.getElementById('messageBox').style.display = 'none';
        }
    });
</script>

</body>
</html>
