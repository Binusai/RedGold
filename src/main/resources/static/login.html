<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#7B2D26">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>Login - YSG BRICKS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background-color: #7B2D26;
            border-radius: 16px;
            padding: 40px 28px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .app-title {
            color: #FFFFFF;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 36px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            font-size: 16px;
            border: 2px solid #FFFFFF;
            border-radius: 8px;
            background-color: #FFFFFF;
            color: #3E2C23;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #C9A23A;
        }

        .form-input::placeholder {
            color: #9B8B7E;
        }

        .password-input {
            padding-right: 48px;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:focus {
            outline: 2px solid #C9A23A;
            outline-offset: 2px;
            border-radius: 4px;
        }

        .eye-icon {
            width: 24px;
            height: 24px;
            fill: #6B5D4F;
        }

        .login-button {
            width: 100%;
            height: 52px;
            background-color: #FFFFFF;
            color: #3E2C23;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 28px;
            transition: background-color 0.2s;
        }

        .login-button:hover {
            background-color: #F4F4F4;
        }

        .login-button:active {
            background-color: #E8E8E8;
        }

        .login-button:focus {
            outline: 2px solid #C9A23A;
            outline-offset: 2px;
        }

        .error-message {
            background-color: rgba(255, 255, 255, 0.15);
            color: #FFFFFF;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Tablet and Desktop Styles */
        @media (min-width: 600px) {
            .login-container {
                max-width: 480px;
            }

            .login-card {
                padding: 56px 48px;
            }

            .app-title {
                font-size: 36px;
                letter-spacing: 4px;
                margin-bottom: 48px;
            }

            .form-group {
                margin-bottom: 24px;
            }

            .form-label {
                font-size: 15px;
                margin-bottom: 10px;
            }

            .form-input {
                height: 54px;
                padding: 0 20px;
                font-size: 17px;
            }

            .password-input {
                padding-right: 56px;
            }

            .password-toggle {
                right: 16px;
            }

            .eye-icon {
                width: 26px;
                height: 26px;
            }

            .login-button {
                height: 56px;
                font-size: 17px;
                margin-top: 36px;
            }

            .error-message {
                font-size: 15px;
                padding: 14px 18px;
            }
        }

        @media (min-width: 900px) {
            .login-container {
                max-width: 520px;
            }

            .login-card {
                padding: 64px 56px;
            }

            .app-title {
                font-size: 40px;
                margin-bottom: 56px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="app-title">RED GOLD</h1>

            <!-- Error message display (if needed) -->
            <div class="error-message" id="errorMessage" style="display: none;">
                Invalid username or password
            </div>

            <form action="/perform_login" method="POST">
                <!-- Username Field -->
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-input" 
                        placeholder="Enter your username"
                        required
                        autocomplete="username"
                    >

                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-wrapper">
                    <input 
                        type="password"
                        id="password" 
                        name="password" 
                        class="form-input password-input" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                        <button 
                            type="button" 
                            class="password-toggle" 
                            id="passwordToggle"
                            aria-label="Toggle password visibility"
                        >
                            <!-- Eye Open Icon (default) -->
                            <svg class="eye-icon" id="eyeOpen" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 5C7 5 2.73 8.11 1 12.5C2.73 16.89 7 20 12 20C17 20 21.27 16.89 23 12.5C21.27 8.11 17 5 12 5ZM12 17.5C9.24 17.5 7 15.26 7 12.5C7 9.74 9.24 7.5 12 7.5C14.76 7.5 17 9.74 17 12.5C17 15.26 14.76 17.5 12 17.5ZM12 9.5C10.34 9.5 9 10.84 9 12.5C9 14.16 10.34 15.5 12 15.5C13.66 15.5 15 14.16 15 12.5C15 10.84 13.66 9.5 12 9.5Z"/>
                            </svg>
                            
                            <!-- Eye Closed Icon (hidden by default) -->
                            <svg class="eye-icon" id="eyeClosed" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display: none;">
                                <path d="M12 7C14.76 7 17 9.24 17 12C17 12.65 16.87 13.26 16.64 13.83L19.56 16.75C21.07 15.49 22.26 13.86 23 12C21.27 7.61 17 4.5 12 4.5C10.6 4.5 9.26 4.75 8.03 5.2L10.17 7.34C10.74 7.11 11.35 7 12 7ZM2 4.27L4.28 6.55L4.73 7C3.08 8.3 1.78 10 1 12C2.73 16.39 7 19.5 12 19.5C13.55 19.5 15.03 19.2 16.38 18.66L16.8 19.08L19.73 22L21 20.73L3.27 3L2 4.27ZM7.53 9.8L9.08 11.35C9.03 11.56 9 11.78 9 12C9 13.66 10.34 15 12 15C12.22 15 12.44 14.97 12.65 14.92L14.2 16.47C13.53 16.8 12.79 17 12 17C9.24 17 7 14.76 7 12C7 11.21 7.2 10.47 7.53 9.8ZM11.84 9.02L14.99 12.17L15.01 12.01C15.01 10.35 13.67 9.01 12.01 9.01L11.84 9.02Z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Login Button -->
                <button type="submit" class="login-button">LOGIN</button>
            </form>
        </div>
    </div>

    <script>
        // Password visibility toggle
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const eyeOpen = document.getElementById('eyeOpen');
        const eyeClosed = document.getElementById('eyeClosed');

        passwordToggle.addEventListener('click', function() {
            if (passwordInput.type === 'text') {
                passwordInput.type = 'password';
                eyeOpen.style.display = 'none';
                eyeClosed.style.display = 'block';
            } else {
                passwordInput.type = 'text';
                eyeOpen.style.display = 'block';
                eyeClosed.style.display = 'none';
            }
        });

        // Check for error parameter in URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            document.getElementById('errorMessage').style.display = 'block';
        }
    </script>
</body>
</html>
