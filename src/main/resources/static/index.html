<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f1f4d">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/images/logo1.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <title>CM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #FFFFFF;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo-image {
            width: 130px;
            max-width: 140px;
            height: auto;
            opacity: 0;
            animation: fadeInLogo 2.2s ease-out forwards;
        }

        .brand-text {
            margin-top: 24px;
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 4px;
            opacity: 0;
            animation: fadeInText 0.6s ease-out forwards;
            animation-delay: 1.2s;
        }

        /* Tablet and Desktop Styles */
        @media (min-width: 600px) {
            .logo-image {
                width: 250px;
                max-width: 280px;
            }

            .brand-text {
                margin-top: 48px;
                font-size: 64px;
                letter-spacing: 6px;
            }
        }

        @media (min-width: 900px) {
            .logo-image {
                width: 320px;
                max-width: 350px;
            }

            .brand-text {
                margin-top: 64px;
                font-size: 80px;
                letter-spacing: 8px;
            }
        }

        @media (min-width: 1200px) {
            .logo-image {
                width: 350px;
                max-width: 350px;
            }

            .brand-text {
                margin-top: 80px;
                font-size: 100px;
            }
        }

        /* CITIZEN — royal blue */
        .text-royal {
            color: #0f1f4d;
        }

        /* PAPER PRODUCTS — starts royal blue, eases into a warm metallic gold */
        .text-gold {
            color: #0f1f4d;
            animation: colorToGold 1s ease-out forwards;
            animation-delay: 1.9s;
        }

        @keyframes fadeInLogo {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInText {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes colorToGold {
            from {
                color: #0f1f4d;
            }
            to {
                color: #D4AF37;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .logo-image,
            .brand-text,
            .text-gold {
                animation: none;
                opacity: 1;
            }

            .text-gold {
                color: #D4AF37;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <img src="/logo.png" alt="Logo" class="logo-image">
        <div class="brand-text">
            <span class="text-royal">CITIZEN</span> <span class="text-gold">PAPER PRODUCTS</span>
        </div>
    </div>

    <script>
        // Check if user prefers reduced motion
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if (prefersReducedMotion) {
            // Redirect immediately if reduced motion is preferred
            setTimeout(function() {
                window.location.href = '/login';
            }, 1000);
        } else {
            // Normal animation timing: 1.2s logo + 0.4s text + 0.6s color + 1s pause = 3.2s
            setTimeout(function() {
                window.location.href = '/login';
            }, 4600);
        }
    </script>
    <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log("SW registered:", reg.scope))
          .catch(err => console.log("SW failed:", err));
      });
    }
    </script>
</body>
</html>
