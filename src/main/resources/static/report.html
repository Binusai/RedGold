<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#C99700">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>Report - CITIZEN PAPER PRODUCTS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #FFFFFF;
            color: #2C2416;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .page-header {
            background-color: #C99700;
            color: #FFFFFF;
            padding: 24px 0;
            margin: -20px -20px 30px -20px;
        }

        .page-header .container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #FFFFFF;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-icon {
            width: 24px;
            height: 24px;
            fill: #FFFFFF;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Section Styles */
        .section {
            background: #FAFAFA;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #C99700;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Customer Details */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .details-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .detail-item {
            margin-bottom: 12px;
        }

        .detail-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 15px;
            color: #2C2416;
            font-weight: 500;
        }

        /* Editable Fields */
        .editable-field {
            width: 100%;
            padding: 8px 12px;
            font-size: 15px;
            color: #2C2416;
            font-weight: 500;
            border: 2px solid #D0D0D0;
            border-radius: 6px;
            background-color: #FFFFFF;
            font-family: inherit;
        }

        .editable-field:focus {
            outline: none;
            border-color: #C99700;
        }

        .editable-field:disabled {
            background-color: #F9F9F9;
            border-color: #E8E8E8;
            cursor: not-allowed;
        }

        .address-field {
            min-height: 60px;
            resize: vertical;
        }

        /* Report Items Table */
        .table-container {
            overflow-x: auto;
            margin-bottom: 16px;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            background: #FFFFFF;
        }

        .report-table th {
            background-color: #C99700;
            color: #FFFFFF;
            padding: 12px 8px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #A67C00;
        }

        .report-table td {
            padding: 10px 8px;
            border: 1px solid #E0E0E0;
        }

        .report-table input,
        .report-table textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #D0D0D0;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .report-table input:focus,
        .report-table textarea:focus {
            outline: none;
            border-color: #C99700;
        }

        .report-table input[type="number"] {
            text-align: right;
        }

        .report-table input:disabled,
        .report-table textarea:disabled {
            background-color: #F5F5F5;
            cursor: not-allowed;
        }

        .report-table .sno {
            width: 50px;
            text-align: center;
            font-weight: 600;
        }

        .report-table .item-col {
            min-width: 120px;
        }

        .report-table .desc-col {
            min-width: 180px;
        }

        .report-table .uom-col {
            min-width: 90px;
        }

        .report-table .rate-col,
        .report-table .qty-col,
        .report-table .discount-col,
        .report-table .amount-col {
            min-width: 100px;
        }

        .report-table .action-col {
            width: 80px;
            text-align: center;
        }

        .delete-btn {
            background-color: #D32F2F;
            color: #FFFFFF;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .delete-btn:hover {
            background-color: #B71C1C;
        }

        .add-row-btn {
            background-color: #2E7D32;
            color: #FFFFFF;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .add-row-btn:hover {
            background-color: #1B5E20;
        }

        .add-row-btn.hidden {
            display: none;
        }

        /* Payment Summary */
        .payment-summary {
            max-width: 400px;
            margin-left: auto;
            background: #FFFFFF;
            border: 2px solid #C99700;
            border-radius: 8px;
            padding: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #E0E0E0;
        }

        .summary-row:last-child {
            border-bottom: none;
            padding-top: 16px;
            margin-top: 8px;
            border-top: 2px solid #C99700;
        }

        .summary-label {
            font-weight: 600;
            font-size: 15px;
        }

        .summary-value {
            font-size: 16px;
            font-weight: 700;
            color: #C99700;
        }
         .uppercase-input {
            text-transform: uppercase;
         }
        .summary-row:last-child .summary-label,
        .summary-row:last-child .summary-value {
            font-size: 18px;
        }

        .discount-input {
            width: 120px;
            padding: 6px 10px;
            border: 1px solid #D0D0D0;
            border-radius: 4px;
            text-align: right;
            font-size: 15px;
        }

        .discount-input:disabled {
            background-color: #F5F5F5;
            cursor: not-allowed;
        }

        /* Remarks */
        .remarks-box {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 2px solid #D0D0D0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .remarks-box:focus {
            outline: none;
            border-color: #C99700;
        }

        .remarks-box:disabled {
            background-color: #F5F5F5;
            cursor: not-allowed;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 2px solid #E0E0E0;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .btn-back {
            background-color: #E0E0E0;
            color: #2C2416;
        }

        .btn-back:hover {
            background-color: #BDBDBD;
        }

        .btn-draft {
            background-color: #1565C0;
            color: #FFFFFF;
        }

        .btn-draft:hover {
            background-color: #0D47A1;
        }

        .btn-submit {
            background-color: #C99700;
            color: #FFFFFF;
        }

        .btn-submit:hover {
            background-color: #A67C00;
        }

        .btn-pdf {
            background-color: #2E7D32;
            color: #FFFFFF;
        }

        .btn-pdf:hover {
            background-color: #1B5E20;
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: #FFFFFF;
        }

        .btn-whatsapp:hover {
            background-color: #1DA851;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.hidden {
            display: none;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .page-header {
                margin: -12px -12px 20px -12px;
                padding: 16px 0;
            }

            .page-title {
                font-size: 20px;
            }

            .section {
                padding: 16px;
            }

            .payment-summary {
                max-width: 100%;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .report-table {
                font-size: 12px;
            }

            .report-table th,
            .report-table td {
                padding: 8px 4px;
            }
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* Success Message */
        .success-message {
            background-color: #E8F5E9;
            color: #2E7D32;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #2E7D32;
            display: none;
        }

        .success-message.visible {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <button class="back-btn" onclick="goBack()">
                <svg class="back-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                </svg>
            </button>
            <h1 class="page-title" id="pageTitle">Create Report</h1>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Success Message -->
        <div class="success-message" id="successMessage"></div>

        <!-- Section B: Customer Details -->
        <div class="section" id="customerDetails">
            <h2 class="section-title">Booking Details</h2>
            <div class="details-grid">
                <div>
                    <div class="detail-item">
                        <div class="detail-label">Customer Name</div>
                        <input type="text" class="editable-field" id="customerName" value="-">
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Mobile</div>
                        <input type="text" class="editable-field" id="customerMobile" value="-">
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">WhatsApp</div>
                        <input type="text" class="editable-field" id="customerWhatsapp" value="-">
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Address</div>
                        <textarea class="editable-field address-field" id="customerAddress">-</textarea>
                    </div>
                </div>
                <div>
                    <div class="detail-item">
                        <div class="detail-label">Destination</div>
                        <input type="text" class="editable-field" id="bookingDestination" value="-">
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Booking Date</div>
                        <div class="detail-value" id="bookingDate">-</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Booking ID</div>
                        <div class="detail-value" id="bookingId">-</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section C: Report Items -->
        <div class="section" id="reportSection">
            <h2 class="section-title">Report Items</h2>
            <div class="table-container">
                <table class="report-table">
                    <thead>
                        <tr>
                            <th class="sno">S.No</th>
                            <th class="desc-col">Description</th>
                            <th class="uom-col">UOM</th>
                            <th class="qty-col">Unit Qty</th>
                            <th class="rate-col">Rate (₹)</th>
                            <th class="discount-col">Discount (₹)</th>
                            <th class="amount-col">Amount (₹)</th>
                            <th class="action-col" id="actionHeader">Action</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody">
                        <!-- Rows will be added dynamically -->
                    </tbody>
                </table>
            </div>
            <button class="add-row-btn" id="addRowBtn" onclick="addReportRow()">
                <span>+</span> Add Row
            </button>
        </div>

        <!-- Section D: Payment Summary -->
        <div class="section" id="paymentSection">
            <h2 class="section-title">Payment Summary</h2>
            <div class="payment-summary">
                <div class="summary-row">
                    <span class="summary-label">Net Total:</span>
                    <span class="summary-value" id="netTotal">₹ 0.00</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Discount:</span>
                    <input type="number" id="discountInput" class="discount-input" value="0" min="0" oninput="onFinalDiscountInput()">
                </div>
                <div class="summary-row">
                    <span class="summary-label">Final Total:</span>
                    <span class="summary-value" id="finalTotal">₹ 0.00</span>
                </div>
            </div>
        </div>

        <!-- Section E: Remarks -->
        <div class="section" id="remarksSection">
            <h2 class="section-title">Remarks / Notes (Optional)</h2>
            <textarea id="remarksBox" class="remarks-box" placeholder="Enter any additional notes or remarks..."></textarea>
        </div>

        <!-- Section F: Action Buttons -->
        <div class="action-buttons" id="actionButtons">
            <!-- Buttons will be injected based on mode -->
        </div>
    </div>

    <script>
        // TODO: paste your base64 PNG logo string here, e.g. const logoDataUrl = "iVBORw0KG...";
        // Leave it empty for now - the PDF will just skip drawing the logo until you add it.
        const logoDataUrl = "";

        let selectedBooking = null;
        let reportItems = [];
        let rowCounter = 0;
        let savedReportId = null;
        let currentMode = 'create'; // create | edit | view
        let bookingId = null;
        let existingReport = null;
        let isSyncingDiscount = false; // guard to stop the row<->final-discount sync from looping

        // Initialize page
        async function init() {
            // Get query parameters
            const params = new URLSearchParams(window.location.search);
            currentMode = params.get('mode') || 'create';
            bookingId = params.get('bookingId');

            if (!bookingId) {
                alert('No booking selected');
                goBack();
                return;
            }

            // Update page title based on mode
            updatePageTitle();

            // Load booking details
            await loadBookingDetails();

            // If edit or view mode, load existing report
            if (currentMode === 'edit' || currentMode === 'view') {
                await loadExistingReport();
            } else {
                // Create mode - initialize with one empty row
                addReportRow();
            }

            // Setup UI based on mode
            setupUIForMode();
        }

        // Update page title based on mode
        function updatePageTitle() {
            const titleElement = document.getElementById('pageTitle');
            if (currentMode === 'create') {
                titleElement.textContent = 'Create Report';
            } else if (currentMode === 'edit') {
                titleElement.textContent = 'Edit Report';
            } else if (currentMode === 'view') {
                titleElement.textContent = 'View Report';
            }
        }
         document.addEventListener("input", function (e) {
             if (e.target.classList.contains("uppercase-input")) {
                 const start = e.target.selectionStart;
                 const end = e.target.selectionEnd;

                  e.target.value = e.target.value.toUpperCase();

                 // keep cursor position (important for textarea)
                 e.target.setSelectionRange(start, end);
             }
          });

        // Format a Date object as dd/mm/yyyy
        function formatDateDDMMYYYY(dateObj) {
            const dd = String(dateObj.getDate()).padStart(2, '0');
            const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
            const yyyy = dateObj.getFullYear();
            return `${dd}/${mm}/${yyyy}`;
        }

        // Format phone as +91-9898989898 (plus sign, then dash after first 2 digits)
        function formatPhone(raw) {
            const digits = (raw || '').replace(/[^0-9]/g, '');
            if (digits.length <= 2) return digits ? '+' + digits : '-';
            return '+' + digits.slice(0, 2) + '-' + digits.slice(2);
        }

        // Load booking details from API
        async function loadBookingDetails() {
            try {
                const response = await fetch('/api/bookings');
                const allBookings = await response.json();

                selectedBooking = allBookings.find(b => b.id == bookingId);

                if (!selectedBooking) {
                    alert('Booking not found');
                    goBack();
                    return;
                }

                // Populate customer details
                const customer = selectedBooking.customer;
                document.getElementById('customerName').value = customer.name;
                document.getElementById('customerMobile').value = customer.mobile;
                document.getElementById('customerWhatsapp').value = customer.whatsapp;
                document.getElementById('customerAddress').value = customer.address;
                document.getElementById('bookingDestination').value = customer.location;
                document.getElementById('bookingDate').textContent = formatDateDDMMYYYY(new Date(selectedBooking.createdAt));
                document.getElementById('bookingId').textContent =
                    selectedBooking.bookingCode || ('BK' + selectedBooking.id.toString().padStart(4, '0'));

            } catch (error) {
                console.error('Error loading booking details:', error);
                alert('Failed to load booking details.');
            }
        }

        // Load existing report (for edit/view mode)
        async function loadExistingReport() {
            try {
                const response = await fetch(`/api/report/by-booking/${bookingId}`);
                existingReport = await response.json();

                if (!existingReport) {
                    alert('Report not found');
                    goBack();
                    return;
                }

                savedReportId = existingReport.id;

                // Populate discount
                document.getElementById('discountInput').value = existingReport.discount || 0;

                // Populate remarks
                document.getElementById('remarksBox').value = existingReport.remarks || '';

                // Populate items
                reportItems = [];
                rowCounter = 0;
                document.getElementById('reportTableBody').innerHTML = '';

                if (existingReport.items && existingReport.items.length > 0) {
                    existingReport.items.forEach(item => {
                        addReportRowWithData(item);
                    });
                } else {
                    addReportRow();
                }

                calculateTotals();

            } catch (error) {
                console.error('Error loading report:', error);
                alert('Failed to load report.');
            }
        }

        // Setup UI based on mode
        function setupUIForMode() {
            const actionButtons = document.getElementById('actionButtons');
            const addRowBtn = document.getElementById('addRowBtn');
            const actionHeader = document.getElementById('actionHeader');

            if (currentMode === 'create') {
                // CREATE MODE
                actionButtons.innerHTML = `
                    <button class="btn btn-back" onclick="goBack()">← Back</button>
                    <button class="btn btn-draft" onclick="saveDraft()">Save Draft</button>
                    <button class="btn btn-submit" onclick="submitReport()">Submit & Finalize</button>
                `;
            } else if (currentMode === 'edit') {
                // EDIT MODE
                actionButtons.innerHTML = `
                    <button class="btn btn-back" onclick="goBack()">← Back</button>
                    <button class="btn btn-draft" onclick="updateDraft()">Update Draft</button>
                    <button class="btn btn-submit" onclick="submitReport()">Finalize Report</button>
                `;
            } else if (currentMode === 'view') {
                // VIEW MODE - Make everything read-only
                disableAllInputs();
                addRowBtn.classList.add('hidden');
                actionHeader.style.display = 'none';

                actionButtons.innerHTML = `
                    <button class="btn btn-back" onclick="goBack()">← Back</button>
                    <button class="btn btn-whatsapp" onclick="sendToWhatsApp()">Send to WhatsApp</button>
                    <button class="btn btn-pdf" onclick="downloadPDF()">Download PDF</button>
                `;
            }
        }

        // Disable all inputs (for view mode)
        function disableAllInputs() {
            document.querySelectorAll('.report-table input, .report-table textarea').forEach(el => el.disabled = true);
            document.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = 'none');
            document.querySelectorAll('.editable-field').forEach(el => el.disabled = true);
            document.getElementById('discountInput').disabled = true;
            document.getElementById('remarksBox').disabled = true;
        }

        // Add new report row
        function addReportRow() {
            rowCounter++;
            const tbody = document.getElementById('reportTableBody');
            const row = tbody.insertRow();
            row.id = `row-${rowCounter}`;

            const isViewMode = currentMode === 'view';

            row.innerHTML = `
                <td class="sno">${rowCounter}</td>
                <td>
                    <textarea rows="2"
                        class="desc-input uppercase-input"
                        placeholder="Description"
                        oninput="updateRow(${rowCounter})"
                        ${isViewMode ? 'disabled' : ''}></textarea>
                </td>
                <td>
                    <input type="text" class="uom-input uppercase-input"
                        placeholder="UOM"
                        oninput="updateRow(${rowCounter})"
                        ${isViewMode ? 'disabled' : ''}>
                </td>
                <td>
                    <input type="number" class="qty-input"
                        placeholder="0"
                        min="0"
                        oninput="updateRow(${rowCounter})"
                        ${isViewMode ? 'disabled' : ''}>
                </td>
                <td>
                    <input type="number" class="rate-input"
                        placeholder="0.00"
                        min="0"
                        step="0.01"
                        oninput="updateRow(${rowCounter})"
                        ${isViewMode ? 'disabled' : ''}>
                </td>
                <td>
                    <input type="number" class="discount-input-row"
                        placeholder="0.00"
                        min="0"
                        step="0.01"
                        oninput="updateRow(${rowCounter})"
                        ${isViewMode ? 'disabled' : ''}>
                </td>
                <td>
                    <input type="number" class="amount-input"
                        placeholder="0.00"
                        readonly>
                </td>
                <td class="action-col" ${isViewMode ? 'style="display:none"' : ''}>
                    <button class="delete-btn"
                        onclick="deleteRow(${rowCounter})">Delete</button>
                </td>
            `;

            reportItems.push({
                id: rowCounter,
                description: '',
                uom: '',
                rate: 0,
                qty: 0,
                discount: 0,
                total: 0
            });
        }

        // Add row with existing data
        function addReportRowWithData(item) {
            rowCounter++;
            const tbody = document.getElementById('reportTableBody');
            const row = tbody.insertRow();
            row.id = `row-${rowCounter}`;

            const isViewMode = currentMode === 'view';

            const rate = item.rate || 0;
            const qty = item.qty || 0;
            const discount = item.discount || 0;
            const total = (rate * qty) - discount;

            row.innerHTML = `
                <td class="sno">${rowCounter}</td>
                <td>
                    <textarea rows="2"
                        class="desc-input uppercase-input"
                        placeholder="Description"
                        oninput="updateRow(${rowCounter})"
                        ${isViewMode ? 'disabled' : ''}>${item.description || ''}</textarea>
                </td>
                <td><input type="text" class="uom-input uppercase-input" value="${item.uom || ''}" placeholder="UOM" oninput="updateRow(${rowCounter})" ${isViewMode ? 'disabled' : ''}></td>
                <td><input type="number" class="qty-input" value="${qty}" placeholder="0" min="0" oninput="updateRow(${rowCounter})" ${isViewMode ? 'disabled' : ''}></td>
                <td><input type="number" class="rate-input" value="${rate}" placeholder="0.00" min="0" step="0.01" oninput="updateRow(${rowCounter})" ${isViewMode ? 'disabled' : ''}></td>
                <td><input type="number" class="discount-input-row" value="${discount}" placeholder="0.00" min="0" step="0.01" oninput="updateRow(${rowCounter})" ${isViewMode ? 'disabled' : ''}></td>
                <td><input type="number" class="amount-input" value="${total.toFixed(2)}" placeholder="0.00" readonly></td>
                <td class="action-col" ${isViewMode ? 'style="display:none"' : ''}>
                    <button class="delete-btn" onclick="deleteRow(${rowCounter})">Delete</button>
                </td>
            `;

            reportItems.push({
                id: rowCounter,
                description: item.description || '',
                uom: item.uom || '',
                rate: rate,
                qty: qty,
                discount: discount,
                total: total
            });
        }

        // Update row data
        function updateRow(rowId) {
            const row = document.getElementById(`row-${rowId}`);
            const description = row.querySelector('.desc-input').value;
            const uom = row.querySelector('.uom-input').value;
            const rate = parseFloat(row.querySelector('.rate-input').value) || 0;
            const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
            const rowDiscount = parseFloat(row.querySelector('.discount-input-row').value) || 0;
            const total = (rate * qty) - rowDiscount;

            // Update amount in the row
            row.querySelector('.amount-input').value = total.toFixed(2);

            // Update reportItems array
            const itemIndex = reportItems.findIndex(i => i.id === rowId);
            if (itemIndex !== -1) {
                reportItems[itemIndex] = {
                    id: rowId,
                    description: description,
                    uom: uom,
                    rate: rate,
                    qty: qty,
                    discount: rowDiscount,
                    total: total
                };
            }

            // Editing a row's discount updates the Final Discount summary field automatically
            if (!isSyncingDiscount) {
                syncFinalDiscountFromRows();
            }

            calculateTotals();
        }

        // Sum every row's discount and push that into the Final Discount summary field
        function syncFinalDiscountFromRows() {
            const sum = reportItems.reduce((s, item) => s + (item.discount || 0), 0);
            document.getElementById('discountInput').value = sum.toFixed(2);
        }

        // Called when the admin types directly into the Final Discount summary field
        function onFinalDiscountInput() {
            splitDiscountAcrossRows();
            calculateTotals();
        }

        // Splits the Final Discount value equally across every row
        function splitDiscountAcrossRows() {
            const finalDiscount = parseFloat(document.getElementById('discountInput').value) || 0;
            const n = reportItems.length;
            if (n === 0) return;

            isSyncingDiscount = true; // prevent updateRow() from re-triggering the sync below

            const perRow = Math.floor((finalDiscount / n) * 100) / 100;
            let assigned = 0;

            reportItems.forEach((item, index) => {
                let rowDiscount;
                if (index === n - 1) {
                    // last row absorbs the rounding remainder so the sum matches exactly
                    rowDiscount = Math.round((finalDiscount - assigned) * 100) / 100;
                } else {
                    rowDiscount = perRow;
                    assigned += perRow;
                }

                item.discount = rowDiscount;
                item.total = (item.rate * item.qty) - rowDiscount;

                const row = document.getElementById(`row-${item.id}`);
                if (row) {
                    row.querySelector('.discount-input-row').value = rowDiscount.toFixed(2);
                    row.querySelector('.amount-input').value = item.total.toFixed(2);
                }
            });

            isSyncingDiscount = false;
        }

        // Delete row
        function deleteRow(rowId) {
            if (reportItems.length <= 1) {
                alert('At least one item is required.');
                return;
            }

            const row = document.getElementById(`row-${rowId}`);
            row.remove();

            reportItems = reportItems.filter(i => i.id !== rowId);

            // Renumber rows
            renumberRows();

            // Row count changed, so the discount split changes too
            syncFinalDiscountFromRows();
            calculateTotals();
        }

        // Renumber rows after deletion
        function renumberRows() {
            const tbody = document.getElementById('reportTableBody');
            const rows = tbody.querySelectorAll('tr');
            rows.forEach((row, index) => {
                row.querySelector('.sno').textContent = index + 1;
            });
        }

        // Calculate totals
        function calculateTotals() {
            // Net Total = gross total before any discount (sum of rate * qty)
            const netTotal = reportItems.reduce((sum, item) => sum + (item.rate * item.qty), 0);
            const discount = parseFloat(document.getElementById('discountInput').value) || 0;
            const finalTotal = netTotal - discount;

            document.getElementById('netTotal').textContent = '₹ ' + formatMoney(netTotal);
            document.getElementById('finalTotal').textContent = '₹ ' + formatMoney(finalTotal);
        }

        // Save as draft
        async function saveDraft() {
            if (!validateReport()) return;

            const reportData = buildReportData('DRAFT');

            try {
                const response = await fetch('/api/report/save-draft', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reportData)
                });

                if (!response.ok) {
                    const text = await response.text();
                    console.error(text);
                    alert("Backend rejected the request.");
                    return;
                }

                const savedId = await response.json();
                savedReportId = savedId;

                showSuccess('Draft saved successfully!');

            } catch (error) {
                console.error(error);
                alert('Failed to save draft.');
            }
        }

        async function submitReport() {
            if (!validateReport()) return;

            if (!confirm('Finalize this report? It cannot be edited later.')) return;

            const reportData = buildReportData('COMPLETED');

            try {
                const response = await fetch('/api/report/finalize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reportData)
                });

                if (!response.ok) {
                    const text = await response.text();
                    console.error(text);
                    alert("Backend rejected the request.");
                    return;
                }

                const savedId = await response.json();
                savedReportId = savedId;

                showSuccess('Report finalized successfully!');

                setTimeout(() => {
                    window.location.href = `/report.html?mode=view&bookingId=${bookingId}`;
                }, 2000);

            } catch (error) {
                console.error(error);
                alert('Failed to finalize report.');
            }
        }

            // Generate PDF using jsPDF
            generatePDF();

        // Get the name of the currently logged-in user, for the "Prepared By" line on the PDF.
        // This checks the common places a login flow tends to stash the user's name.
        // If your login code stores it somewhere else, just point this at that key.
        function getPreparedByName() {
            try {
                const candidates = [
                    localStorage.getItem('loggedInUserName'),
                    localStorage.getItem('username'),
                    localStorage.getItem('userName'),
                    sessionStorage.getItem('loggedInUserName'),
                    sessionStorage.getItem('username'),
                    sessionStorage.getItem('userName')
                ];
                const found = candidates.find(v => v && v.trim() !== '');
                return found || 'Admin';
            } catch (e) {
                return 'Admin';
            }
        }

            doc.text(':', colonX, yPos);
            doc.setTextColor(accent[0], accent[1], accent[2]);
            doc.text(finalTotal.toFixed(2), amountX, yPos, { align: 'right' });
            doc.setTextColor(0, 0, 0);

            // === REMARKS ===
            if (remarks && remarks.trim()) {
                yPos += 12;
                if (yPos > 250) {
                    doc.addPage();
                    yPos = 20;
                }

                doc.setFontSize(10);
                doc.setFont(undefined, 'bold');
                doc.text('REMARKS:', 20, yPos);
                yPos += 5;

                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                const remarksLines = doc.splitTextToSize(remarks, 170);
                remarksLines.forEach(line => {
                    yPos += 5;
                    if (yPos > 280) {
                        doc.addPage();
                        yPos = 20;
                    }
                    doc.text(line, 20, yPos);
                });
            }

            // === TERMS AND CONDITIONS ===
            yPos += 14;
            if (yPos > 250) {
                doc.addPage();
                yPos = 20;
            }

            doc.setFontSize(10);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(0, 0, 0);
            doc.text('TERMS AND CONDITIONS :', 20, yPos);
            yPos += 6;

            const terms = [
                'Damaged or defective paper products can be returned or exchanged within 3 days from the date of purchase.',
                'Returns or exchanges will only be accepted with a valid purchase receipt.',
                'Products must be returned in their original packaging and unused condition.',
                'No returns or exchanges will be accepted after the specified return period.',
                'Customers are requested to check products at the time of purchase to ensure they are in good condition.',
                'Replacement will be provided only for verified damaged or defective items, subject to availability.',
                'Customized or specially ordered products cannot be returned or exchanged.'
            ];

            doc.setFontSize(8.5);
            doc.setFont('helvetica', 'normal');

            terms.forEach((term, index) => {
                const termLines = doc.splitTextToSize(`${index + 1}. ${term}`, contentRight - 20);
                termLines.forEach(line => {
                    if (yPos > 280) {
                        doc.addPage();
                        yPos = 20;
                    }
                    doc.text(line, 20, yPos);
                    yPos += 4.5;
                });
            });

            // === NOTE + PREPARED BY ===
            yPos += 8;
            if (yPos > 275) {
                doc.addPage();
                yPos = 20;
            }

            doc.setFontSize(8.5);
            doc.setFont('helvetica', 'bolditalic');
            doc.setTextColor(80, 80, 80);
            doc.text('NOTE : COMPUTER GENERATED BILL, NO SIGNATURE REQUIRED', 20, yPos);

            yPos += 7;
            doc.setFontSize(9);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(0, 0, 0);
            doc.text('PREPARED BY : ' + getPreparedByName(), 20, yPos);

            // === FOOTER ===
            const pageCount = doc.internal.getNumberOfPages();
            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFontSize(7);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(120, 120, 120);
                doc.text('Generated on ' + new Date().toLocaleDateString('en-IN'), 105, 288, { align: 'center' });
            }

            const filename = `Citizen_Report_${bookingCode.replace(/\s+/g, '_')}.pdf`;
            doc.save(filename);
        }

        // Build report data object
        function buildReportData(status) {

            const customerName = document.getElementById('customerName').value.trim();
            const mobile = document.getElementById('customerMobile').value.trim();
            const address = document.getElementById('customerAddress').value.trim();
            const location = document.getElementById('bookingDestination').value.trim();

            const validItems = reportItems.filter(item => item.description && item.description.trim() !== '');

            const netTotal = validItems.reduce((sum, item) => sum + (item.rate * item.qty), 0);
            const discount = parseFloat(document.getElementById('discountInput').value) || 0;
            const finalTotal = netTotal - discount;

            return {
                bookingId: selectedBooking.id,
                status: status,

                items: validItems.map(item => ({
                    description: item.description,
                    uom: item.uom,
                    rate: item.rate,
                    qty: item.qty,
                    discount: item.discount,
                    total: item.total
                })),

                discount: discount,
                netTotal: netTotal,
                finalTotal: finalTotal,

                remarks: document.getElementById('remarksBox').value.trim(),

                customerName: customerName,
                mobile: mobile,
                email: selectedBooking.customer.email || null, // keep existing
                address: address,
                location: location
            };
        }



        // Validate report
        function validateReport() {
            const validItems = reportItems.filter(item => item.description && item.description.trim() !== '');

            if (validItems.length === 0) {
                alert('Please add at least one description to the report.');
                return false;
            }

            for (let item of validItems) {
                if (item.rate <= 0 || item.qty <= 0) {
                    alert('All items must have valid rate and quantity.');
                    return false;
                }
            }

            return true;
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('visible');

            setTimeout(() => {
                successDiv.classList.remove('visible');
            }, 5000);
        }

        // Format number with commas
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // Format money
        function formatMoney(amount) {
            return amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // Go back
        function goBack() {
            window.location.href = '/reports.html';
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
