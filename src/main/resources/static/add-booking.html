<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f1f4d">
    <link rel="icon" href="/images/logo1.png" type="image/png">
    <title>Add Booking - CM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #F4EFEA;
            color: #3E2C23;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 20px;
            padding-top: 72px;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: #0f1f4d;
            z-index: 1000;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.15);
        }

        .navbar-container {
            max-width: 1400px;
            height: 100%;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        /* Back Button */
        .back-button {
            background: none;
            border: none;
            color: #FFFFFF;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .back-icon {
            width: 24px;
            height: 24px;
            fill: #FFFFFF;
        }

        /* Brand */
        .navbar-brand {
            flex: 1;
            text-align: center;
            padding: 0 10px;
        }

        .brand-text {
            color: #FFFFFF;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Right side - Username + Logo */
        .navbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .navbar-username {
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .navbar-logo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: contain;
            background: #FFFFFF;
            padding: 4px;
            flex-shrink: 0;
        }

        /* Main Content */
        .main-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .form-container {
            background-color: #FFFFFF;
            border-radius: 12px;
            padding: 24px 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #3E2C23;
            margin-bottom: 8px;
        }

        .required {
            color: #0f1f4d;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #D4C4B8;
            border-radius: 8px;
            background-color: #FFFFFF;
            color: #3E2C23;
            transition: border-color 0.2s;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #0f1f4d;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: #9B8B7E;
        }

        .form-input:disabled {
            background-color: #F4EFEA;
            color: #6B5D4F;
            cursor: not-allowed;
        }

        /* Toggle */
        .toggle-container {
            display: flex;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .toggle-switch {
            position: relative;
            width: 48px;
            height: 26px;
            background-color: #D4C4B8;
            border-radius: 13px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .toggle-switch.active {
            background-color: #0f1f4d;
        }

        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background-color: #FFFFFF;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-switch.active .toggle-slider {
            transform: translateX(22px);
        }

        .toggle-label {
            font-size: 14px;
            color: #3E2C23;
            font-weight: 500;
        }

        /* Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: #0f1f4d;
            color: #FFFFFF;
        }

        .btn-primary:active {
            background-color: #0a1533;
        }

        .btn-secondary {
            background-color: #FFFFFF;
            color: #0f1f4d;
            border: 2px solid #0f1f4d;
        }

        .btn-secondary:active {
            background-color: #F4EFEA;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Success Modal */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .success-overlay.active {
            display: flex;
        }

        .success-modal {
            background-color: #FFFFFF;
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 90%;
            width: 340px;
            text-align: center;
        }

        .success-checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-title {
            font-size: 20px;
            font-weight: 700;
            color: #3E2C23;
            margin-bottom: 8px;
        }

        .success-message {
            font-size: 15px;
            color: #6B5D4F;
            margin-bottom: 28px;
        }

        .success-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Loading State */
        .loading {
            pointer-events: none;
            opacity: 0.6;
        }

        /* Tablet and Desktop */
        @media (min-width: 600px) {
            .navbar {
                height: 72px;
            }

            body {
                padding-top: 72px;
            }

            .back-icon {
                width: 28px;
                height: 28px;
            }

            .brand-text {
                font-size: 20px;
            }

            .navbar-username {
                font-size: 15px;
                max-width: 200px;
            }

            .navbar-logo {
                width: 40px;
                height: 40px;
                padding: 4px;
            }

            .main-content {
                padding: 32px 24px;
            }

            .form-container {
                padding: 32px 28px;
            }

            .form-label {
                font-size: 15px;
                margin-bottom: 10px;
            }

            .form-input,
            .form-textarea {
                padding: 16px 18px;
                font-size: 17px;
            }

            .form-textarea {
                min-height: 120px;
            }

            .button-group {
                flex-direction: row;
                justify-content: space-between;
            }

            .btn {
                width: auto;
                min-width: 180px;
                padding: 18px 32px;
                font-size: 17px;
            }

            .success-modal {
                width: 420px;
                padding: 48px 40px;
            }

            .success-checkmark {
                width: 100px;
                height: 100px;
            }

            .success-title {
                font-size: 24px;
            }

            .success-message {
                font-size: 16px;
            }

            .success-buttons {
                flex-direction: row;
                justify-content: center;
                gap: 16px;
            }

            .success-buttons .btn {
                min-width: 160px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                height: 60px;
            }

            body {
                padding-top: 60px;
            }

            .navbar-container {
                padding: 0 12px;
            }

            .brand-text {
                font-size: 15px;
                letter-spacing: 0.3px;
            }

            .navbar-username {
                font-size: 12px;
                max-width: 80px;
            }

            .navbar-logo {
                width: 30px;
                height: 30px;
                padding: 3px;
            }

            .back-icon {
                width: 20px;
                height: 20px;
            }

            .main-content {
                padding: 12px 12px;
            }

            .form-container {
                padding: 18px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <header class="navbar">
        <div class="navbar-container">
            <!-- Back Button -->
            <button class="back-button" onclick="goBack()">
                <svg class="back-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                </svg>
            </button>

            <!-- App Name -->
            <div class="navbar-brand">
                <span class="brand-text">ADD BOOKING</span>
            </div>

            <!-- Right side: Username + Logo -->
            <div class="navbar-right">
                <span class="navbar-username" id="navbarUsername">Guest</span>
                <img src="/images/logo1.png" alt="Logo" class="navbar-logo">
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main-content">
        <form id="bookingForm" class="form-container">
            <!-- Name -->
            <div class="form-group">
                <label for="name" class="form-label">Name <span class="required">*</span></label>
                <input 
                    type="text" 
                    id="name" 
                    class="form-input" 
                    placeholder="Enter customer name"
                    required
                >
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-input" 
                    placeholder="Enter email address"
                >
            </div>

            <!-- Mobile Number -->
            <div class="form-group">
                <label for="mobile" class="form-label">Mobile Number <span class="required">*</span></label>
                <input 
                    type="tel"
                    id="mobile"
                    class="form-input"
                    placeholder="Enter mobile number"
                    maxlength="10"
                    pattern="[0-9]{10}"
                    inputmode="numeric"
                    required
                >
            </div>

            <!-- WhatsApp Number -->
            <div class="form-group">
                <label for="whatsapp" class="form-label">WhatsApp Number</label>
                <div class="toggle-container">
                    <div class="toggle-switch" id="whatsappToggle" onclick="toggleWhatsApp()">
                        <div class="toggle-slider"></div>
                    </div>
                    <span class="toggle-label">Same as Mobile</span>
                </div>
                <input 
                    type="tel"
                    id="whatsapp"
                    class="form-input"
                    placeholder="Enter WhatsApp number"
                    maxlength="10"
                    pattern="[0-9]{10}"
                    inputmode="numeric"
                />
            </div>

            <!-- Address -->
            <div class="form-group">
                <label for="address" class="form-label">Address</label>
                <textarea 
                    id="address" 
                    class="form-textarea" 
                    placeholder="Enter customer address"
                ></textarea>
            </div>

            <!-- Delivery Location with "Same as Address" Toggle -->
            <div class="form-group">
                <label for="location" class="form-label">Delivery Location (To Where)</label>
                <div class="toggle-container">
                    <div class="toggle-switch" id="locationToggle" onclick="toggleLocation()">
                        <div class="toggle-slider"></div>
                    </div>
                    <span class="toggle-label">Same as Address</span>
                </div>
                <input 
                    type="text" 
                    id="location" 
                    class="form-input" 
                    placeholder="Enter delivery location"
                />
            </div>

            <!-- Quantity - COMMENTED OUT (removed from UI) -->
            <!-- 
            <div class="form-group">
                <label for="quantity" class="form-label">Quantity <span class="required">*</span></label>
                <input 
                    type="number" 
                    id="quantity" 
                    class="form-input" 
                    placeholder="Enter quantity"
                    min="1"
                    required
                >
            </div>
            -->

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn btn-primary" id="saveBtn">SAVE BOOKING</button>
                <button type="button" class="btn btn-secondary" onclick="goToHome()">BACK TO HOME</button>
            </div>
        </form>
    </div>

    <!-- Success Modal -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-modal">
            <svg class="success-checkmark" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
                <circle cx="26" cy="26" r="25" fill="none" stroke="#0f1f4d" stroke-width="2"/>
                <path fill="none" stroke="#0f1f4d" stroke-width="3" stroke-linecap="round" d="M14 27l8 8 16-16"/>
            </svg>
            <div class="success-title">Booking Added Successfully!</div>
            <div class="success-message" id="successName">Booking for <strong>Customer Name</strong> added successfully</div>
            <div class="success-buttons">
                <button class="btn btn-primary" onclick="createReport()">CREATE REPORT</button>
                <button class="btn btn-secondary" onclick="goToHome()">BACK TO HOME</button>
            </div>
        </div>
    </div>

    <script>
        // ===== SET USERNAME =====
        (function setUsername() {
            const username = localStorage.getItem('username') || sessionStorage.getItem('username');
            const el = document.getElementById('navbarUsername');
            if (el) {
                el.textContent = username || 'Guest';
            }
        })();

        let isWhatsAppSameAsMobile = false;
        let isLocationSameAsAddress = false;
        let customerName = '';

        // Toggle WhatsApp same as mobile
        function toggleWhatsApp() {
            const toggle = document.getElementById('whatsappToggle');
            const whatsappInput = document.getElementById('whatsapp');
            const mobileInput = document.getElementById('mobile');
        
            isWhatsAppSameAsMobile = !isWhatsAppSameAsMobile;
        
            if (isWhatsAppSameAsMobile) {
                toggle.classList.add('active');
                whatsappInput.value = mobileInput.value;
                whatsappInput.disabled = true;
            } else {
                toggle.classList.remove('active');
                whatsappInput.disabled = false;
                whatsappInput.value = '';
            }
        }

        // Toggle Location same as Address
        function toggleLocation() {
            const toggle = document.getElementById('locationToggle');
            const locationInput = document.getElementById('location');
            const addressInput = document.getElementById('address');
        
            isLocationSameAsAddress = !isLocationSameAsAddress;
        
            if (isLocationSameAsAddress) {
                toggle.classList.add('active');
                locationInput.value = addressInput.value;
                locationInput.disabled = true;
            } else {
                toggle.classList.remove('active');
                locationInput.disabled = false;
                locationInput.value = '';
            }
        }

        // When address changes, update location if toggle is ON
        document.getElementById('address').addEventListener('input', function() {
            if (isLocationSameAsAddress) {
                document.getElementById('location').value = this.value;
            }
        });

        function restrictToTenDigits(el) {
            el.value = el.value.replace(/\D/g, '');
            if (el.value.length > 10) {
                el.value = el.value.slice(0, 10);
            }
        }
        
        document.getElementById('mobile').addEventListener('input', function () {
            restrictToTenDigits(this);
        
            if (isWhatsAppSameAsMobile) {
                document.getElementById('whatsapp').value = this.value;
            }
        });
        
        document.getElementById('whatsapp').addEventListener('input', function () {
            restrictToTenDigits(this);
        });


        // Handle form submission
        document.getElementById('bookingForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'SAVING...';

            // Collect form data
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const address = document.getElementById('address').value.trim();
            const location = document.getElementById('location').value.trim();

            // Default quantity to 0 (backend will handle it)
            const quantity = 0;

            customerName = name;

            const formattedMobile = "91" + mobile;
            const formattedWhatsapp = whatsapp ? "91" + whatsapp : formattedMobile;
            
            const bookingData = {
                name: name,
                email: email || null,
                mobile: formattedMobile,
                whatsapp: formattedWhatsapp,
                address: address || null,
                location: location || null,
                quantity: parseInt(quantity)
            };

            try {
                const response = await fetch('/api/add-booking', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bookingData)
                });

                if (response.ok) {

                    const bookingId = await response.json();   // get ID from backend

                    window.lastCreatedBookingId = bookingId;   // store globally

                    document.getElementById('successName').innerHTML =
                        `Booking for <strong>${customerName}</strong> added successfully`;

                    document.getElementById('successOverlay').classList.add('active');
                }
                else {
                    alert('Failed to save booking. Please try again.');
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'SAVE BOOKING';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please check your connection and try again.');
                saveBtn.disabled = false;
                saveBtn.textContent = 'SAVE BOOKING';
            }
        });

        // Navigation functions
        function goBack() {
            window.history.back();
        }

        function goToHome() {
            window.location.href = '/home.html';
        }

        function createReport() {
            if (!window.lastCreatedBookingId) {
                alert("Booking ID missing");
                return;
            }

            window.location.href =
                `/report.html?mode=create&bookingId=${window.lastCreatedBookingId}`;
        }

        // Also update username when page becomes visible
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                const username = localStorage.getItem('username') || sessionStorage.getItem('username');
                const el = document.getElementById('navbarUsername');
                if (el) {
                    el.textContent = username || 'Guest';
                }
            }
        });
    </script>
</body>
</html>
